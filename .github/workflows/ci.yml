name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and test tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Compile sources
        run: python -m compileall -q src tests
      - name: Run test suite
        run: python -m pytest -q
      - name: Benchmark harness smoke test
        if: matrix.python-version == '3.12'
        run: >-
          python benchmarks/benchmark_simulation.py
          --populations 30 --modes serial threaded --ticks 2 --warmup 1
          --max-ms-per-tick 1000 --output /tmp/benchmark-smoke.json

  package:
    name: Build and inspect distributions
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: python -m pip install --upgrade pip && python -m pip install ".[dev]"
      - name: Build wheel and source distribution
        run: python -m build
      - name: Validate distribution metadata
        run: python -m twine check dist/*
      - name: Verify distribution contents
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheel = glob.glob("dist/*.whl")[0]
          with zipfile.ZipFile(wheel) as archive:
              names = archive.namelist()
          forbidden = ("results.csv", "run_event_summary.csv", "dashboard_data.json")
          found = [name for name in names if name.endswith(forbidden)]
          if found:
              raise SystemExit(f"generated artifacts packaged: {found}")
          PY
      - name: Smoke-test installed wheel
        run: |
          python -m venv /tmp/thalren-wheel-test
          /tmp/thalren-wheel-test/bin/pip install dist/*.whl
          cd /tmp
          /tmp/thalren-wheel-test/bin/thalren-vale --seed 7 --ticks 3 --condition ci --disable-antistag
          test -f /tmp/data/run_manifest_ci_seed_7.json
      - uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/*
